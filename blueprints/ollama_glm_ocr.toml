id = "ollama_glm_ocr"
name = "Ollama GLM OCR"
description = "Zhipu GLM with OCR capabilities on Ollama Cloud"

[model_card]
model_name = "glm-ocr:cloud"
provider = "ollama"
format_dialect = "ChatMlTools"
quirks = ["MultimodalInput", "ThinkingEnabled"]

[scaffolding]
max_tools_per_turn = 3
strict_mode = false

[tools]
core_tools = ["ollama_web_search", "ollama_web_fetch", "bash", "read", "write"]

[prompts]
system_prompt_override = "You are GLM OCR on Ollama Cloud. You specialize in document understanding and OCR."

id = "ollama_glm_5"
name = "Ollama GLM 5"
description = "Zhipu GLM 5 on Ollama Cloud — large context general-purpose model"

[model_card]
model_name = "glm-5:cloud"
provider = "ollama"
format_dialect = "ChatMlTools"
quirks = ["ThinkingEnabled"]

[scaffolding]
max_tools_per_turn = 3
strict_mode = false

[tools]
core_tools = ["ollama_web_search", "ollama_web_fetch", "bash", "read", "write"]

[prompts]
system_prompt_override = "You are GLM 5 on Ollama Cloud. Large context and general-purpose reasoning."

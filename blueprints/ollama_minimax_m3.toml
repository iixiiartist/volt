id = "ollama_minimax_m3"
name = "Ollama MiniMax M3"
description = "512K–1M ctx with Sparse Attention, vision+text, tool calling, thinking"

[model_card]
model_name = "minimax-m3:cloud"
provider = "ollama"
format_dialect = "ChatMlTools"
quirks = ["MultimodalInput", "ThinkingEnabled"]

[scaffolding]
max_tools_per_turn = 5
strict_mode = false

[tools]
core_tools = ["ollama_web_search", "ollama_web_fetch", "bash", "read", "write"]

[prompts]
system_prompt_override = "You are MiniMax M3 on Ollama Cloud. Up to 1M context with vision, tools, and thinking."

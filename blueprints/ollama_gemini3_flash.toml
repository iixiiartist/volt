id = "ollama_gemini3_flash"
name = "Ollama Gemini 3 Flash"
description = "Google Gemini 3 Flash on Ollama Cloud — fast, multimodal, tool-capable"

[model_card]
model_name = "gemini-3-flash:cloud"
provider = "ollama"
format_dialect = "ChatMlTools"
quirks = ["MultimodalInput", "ThinkingEnabled"]

[scaffolding]
max_tools_per_turn = 5
strict_mode = false

[tools]
core_tools = ["ollama_web_search", "ollama_web_fetch", "bash", "read", "write"]

[prompts]
system_prompt_override = "You are Gemini 3 Flash on Ollama Cloud. Fast, multimodal, and tool-capable."

id = "qwen3_32b"
name = "Qwen 3 32B"
description = "Top-ranked Groq model with tools, JSON, and reasoning at ~400 tps"

[model_card]
model_name = "qwen/qwen3-32b"
provider = "groq"
format_dialect = "ChatMlTools"
quirks = ["SchemaLimitTen", "ChainOfThoughtLeak"]

[scaffolding]
max_tools_per_turn = 5
strict_mode = true

[tools]
core_tools = ["web_search", "bash", "read", "write", "create_bar_chart", "create_line_chart"]

[prompts]
system_prompt_override = "You are Qwen 3 32B, Groq's top-performing model on BFCL v3. Use tools precisely and provide accurate responses."

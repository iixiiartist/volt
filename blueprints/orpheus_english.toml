id = "orpheus_english"
name = "Orpheus TTS English"
description = "Neural text-to-speech for English with natural prosody"

[model_card]
model_name = "canopylabs/orpheus-v1-english"
provider = "groq"
format_dialect = "GemmaNative"
quirks = ["NoToolCalling"]

[scaffolding]
max_tools_per_turn = 1
strict_mode = false

[tools]
core_tools = []

[prompts]
system_prompt_override = "You are a text-to-speech synthesis model. Convert text to natural-sounding speech with the specified voice and speed."

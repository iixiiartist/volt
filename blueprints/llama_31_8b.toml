id = "llama_31_8b"
name = "Llama 3.1 8B Instant"
description = "Blazing fast Groq model at ~560 tps with full 131K context"

[model_card]
model_name = "llama-3.1-8b-instant"
provider = "groq"
format_dialect = "LlamaChat"
quirks = ["StringifiedBooleans", "StringifiedIntegers", "ChainOfThoughtLeak"]

[scaffolding]
max_tools_per_turn = 3
strict_mode = false

[tools]
core_tools = ["bash", "read", "write"]

[prompts]
system_prompt_override = "You are Llama 3.1 8B, a fast and efficient assistant. Respond quickly and concisely."

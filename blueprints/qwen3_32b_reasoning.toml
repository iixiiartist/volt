id = "qwen3_32b_reasoning"
name = "Qwen 3 32B Reasoning"
description = "Reasoning-optimized variant with explicit chain-of-thought"

[model_card]
model_name = "qwen/qwen3-32b"
provider = "groq"
format_dialect = "ChatMlTools"
quirks = ["ChainOfThoughtLeak", "DeepReasoning"]

[scaffolding]
max_tools_per_turn = 3
strict_mode = true

[tools]
core_tools = ["web_search", "bash", "read", "write"]

[prompts]
system_prompt_override = "You are a reasoning-focused Qwen 3 32B. Think step by step before answering. Show your reasoning explicitly."

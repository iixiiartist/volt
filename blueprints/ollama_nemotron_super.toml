id = "ollama_nemotron_super"
name = "Ollama Nemotron-3 Super"
description = "Nemotron-3 Super on Ollama Cloud with thinking support"

[model_card]
model_name = "nemotron-3-super"
provider = "ollama"
format_dialect = "LlamaChat"
quirks = ["ChainOfThoughtLeak"]

[scaffolding]
max_tools_per_turn = 6
strict_mode = false

[tools]
core_tools = ["ollama_web_search", "ollama_web_fetch", "bash", "read", "write"]

[prompts]
system_prompt_override = "You are Nemotron-3 Super on Ollama Cloud. You excel at multi-agent orchestration and complex reasoning."

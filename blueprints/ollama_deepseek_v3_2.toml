id = "ollama_deepseek_v3_2"
name = "Ollama DeepSeek V3.2"
description = "DeepSeek V3.2 on Ollama Cloud — coding and reasoning specialist"

[model_card]
model_name = "deepseek-v3.2:cloud"
provider = "ollama"
format_dialect = "ChatMlTools"
quirks = ["ThinkingEnabled"]

[scaffolding]
max_tools_per_turn = 5
strict_mode = false

[tools]
core_tools = ["ollama_web_search", "ollama_web_fetch", "bash", "read", "write"]

[prompts]
system_prompt_override = "You are DeepSeek V3.2 on Ollama Cloud. Specialized in coding, reasoning, and tool use."

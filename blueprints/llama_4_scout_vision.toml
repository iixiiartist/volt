id = "llama_4_scout_vision"
name = "Llama 4 Scout Vision"
description = "Vision-optimized variant for image analysis tasks"

[model_card]
model_name = "meta-llama/llama-4-scout-17b-16e-instruct"
provider = "groq"
format_dialect = "LlamaChat"
quirks = ["MultimodalInput"]

[scaffolding]
max_tools_per_turn = 3
strict_mode = true

[tools]
core_tools = ["read", "browser_screenshot", "desktop_screenshot"]

[prompts]
system_prompt_override = "You are a vision-capable assistant. Analyze images and screenshots to answer the user's questions about visual content."

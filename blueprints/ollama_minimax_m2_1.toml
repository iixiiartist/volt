id = "ollama_minimax_m2_1"
name = "Ollama MiniMax M2.1"
description = "Multilingual code engineering — tool calling ✅, no thinking, text-only"

[model_card]
model_name = "minimax-m2.1:cloud"
provider = "ollama"
format_dialect = "ChatMlTools"
quirks = ["NonThinking"]

[scaffolding]
max_tools_per_turn = 3
strict_mode = false

[tools]
core_tools = ["ollama_web_search", "bash", "read", "write"]

[prompts]
system_prompt_override = "You are MiniMax M2.1 on Ollama Cloud. Multilingual code engineering with tool calling."

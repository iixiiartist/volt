id = "ollama_qwen3_5_32b"
name = "Ollama Qwen 3.5 32B"
description = "Multimodal MoE — vision+text, tool calling + thinking"

[model_card]
model_name = "qwen3.5:32b-cloud"
provider = "ollama"
format_dialect = "ChatMlTools"
quirks = ["MultimodalInput", "ThinkingEnabled"]

[scaffolding]
max_tools_per_turn = 3
strict_mode = false

[tools]
core_tools = ["ollama_web_search", "bash", "read", "write"]

[prompts]
system_prompt_override = "You are Qwen 3.5 32B on Ollama Cloud. Multimodal MoE with vision, tools, and thinking."

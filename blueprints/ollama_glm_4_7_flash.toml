id = "ollama_glm_4_7_flash"
name = "Ollama GLM 4.7 Flash"
description = "Zhipu GLM 4.7 Flash on Ollama Cloud — fast general-purpose model"

[model_card]
model_name = "glm-4.7-flash:cloud"
provider = "ollama"
format_dialect = "ChatMlTools"

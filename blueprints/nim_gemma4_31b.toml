id = "nim_gemma4_31b"
name = "NVIDIA NIM Gemma 4 31B"
description = "Dense 31B frontier reasoning model for coding and agentic workflows on NVIDIA NIM"

[model_card]
model_name = "google/gemma-4-31b-it"
provider = "nvidia"
format_dialect = "ChatMlTools"
quirks = ["MultimodalInput"]

[scaffolding]
max_tools_per_turn = 3
strict_mode = false

[tools]
core_tools = ["web_search", "bash", "read", "write"]

[prompts]
system_prompt_override = "You are Gemma 4 31B, a dense frontier reasoning model hosted on NVIDIA NIM. You excel at coding and agentic workflows."

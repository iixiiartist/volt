id = "gpt_oss_safeguard_20b"
name = "GPT-OSS Safeguard 20B"
description = "Safety-focused model with policy-following moderation and Harmony format"

[model_card]
model_name = "openai/gpt-oss-safeguard-20b"
provider = "groq"
format_dialect = "Harmony"
quirks = ["StringifiedBooleans", "PolicyGuard"]

[scaffolding]
max_tools_per_turn = 1
strict_mode = true

[tools]
core_tools = ["bash", "read"]

[prompts]
system_prompt_override = "You are a safety moderation model. Analyze content against the provided policy and respond with structured safety assessments."

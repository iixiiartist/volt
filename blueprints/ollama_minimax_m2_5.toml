id = "ollama_minimax_m2_5"
name = "Ollama MiniMax M2.5"
description = "Real-world productivity + coding — tool calling + thinking"

[model_card]
model_name = "minimax-m2.5:cloud"
provider = "ollama"
format_dialect = "ChatMlTools"
quirks = ["ThinkingEnabled"]

[scaffolding]
max_tools_per_turn = 4
strict_mode = false

[tools]
core_tools = ["ollama_web_search", "bash", "read", "write"]

[prompts]
system_prompt_override = "You are MiniMax M2.5 on Ollama Cloud. Productivity and coding with tool calling and thinking."

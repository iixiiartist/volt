id = "ollama_nemotron3_nano"
name = "Ollama Nemotron-3 Nano"
description = "NVIDIA Nemotron-3 Nano on Ollama Cloud — compact reasoning model"

[model_card]
model_name = "nemotron-3-nano:cloud"
provider = "ollama"
format_dialect = "ChatMlTools"
quirks = ["ThinkingEnabled"]

[scaffolding]
max_tools_per_turn = 3
strict_mode = false

[tools]
core_tools = ["ollama_web_search", "ollama_web_fetch", "bash", "read", "write"]

[prompts]
system_prompt_override = "You are Nemotron-3 Nano on Ollama Cloud. Compact but capable reasoning assistant."

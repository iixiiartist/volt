id = "gpt_oss_120b"
name = "GPT-OSS 120B Flagship"
description = "Most capable Groq model with vision, reasoning, tools, and structured outputs"

[model_card]
model_name = "openai/gpt-oss-120b"
provider = "groq"
format_dialect = "ChatMlTools"
quirks = ["SchemaLimitTen", "MarkdownCodeBlocks"]

[scaffolding]
max_tools_per_turn = 10
strict_mode = true

[tools]
core_tools = ["web_search", "bash", "read", "write", "browser_navigate", "browser_extract", "create_pdf", "create_bar_chart", "create_line_chart"]

[prompts]
system_prompt_override = "You are GPT-OSS 120B, Groq's most capable model. You have vision, reasoning, tools, and structured output capabilities."

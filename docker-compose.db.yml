services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: volt
      POSTGRES_PASSWORD: volt
      POSTGRES_DB: volt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U volt"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:

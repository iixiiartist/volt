# GNU fallback — static link libstdc++/libgcc for distribution
[target.x86_64-pc-windows-gnu]
rustflags = ["-C", "link-args=-static -static-libstdc++"]

[target.i686-pc-windows-gnu]
rustflags = ["-C", "link-args=-static -static-libstdc++"]

# NOTE: MSVC dynamic CRT flags (CXXFLAGS=/MD, CFLAGS=/MD) are NOT set here
# because [env] in .cargo/config.toml applies globally and breaks Linux/macOS
# builds (gcc interprets /MD as a file path). Windows MSVC builders should set
# these environment variables in their shell before building:
#   $env:CXXFLAGS="/MD"; $env:CFLAGS="/MD"; cargo build
# This matches ort-sys prebuilt binaries (dynamic CRT MD_DynamicRelease).
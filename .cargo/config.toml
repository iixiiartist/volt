# GNU fallback — static link libstdc++/libgcc for distribution
[target.x86_64-pc-windows-gnu]
rustflags = ["-C", "link-args=-static -static-libstdc++"]

[target.i686-pc-windows-gnu]
rustflags = ["-C", "link-args=-static -static-libstdc++"]

# MSVC dynamic CRT — matches ort-sys prebuilt binaries (ort v2.0.0-rc.12).
# Required on Windows MSVC to avoid LNK2038/LNK4098 linker errors when
# esaxx-rs (tokenizers dep) uses static CRT while ort uses dynamic CRT.
# On Linux/macOS these are overridden in CI (see .gitlab-ci.yml).
[env]
CXXFLAGS = "/MD"
CFLAGS = "/MD"
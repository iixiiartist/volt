image: rust:1.95

variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
  CARGO_TERM_COLOR: always
  POSTGRES_USER: volt
  POSTGRES_PASSWORD: volt
  POSTGRES_DB: volt_test
  POSTGRES_HOST_AUTH_METHOD: trust

stages:
  - test
  - lint
  - security
  - docs
  - build
  - release

# Cache template reused across jobs (hidden job)
.cargo_cache: &cargo_cache
  key:
    files:
      - Cargo.lock
  paths:
    - ${CARGO_HOME}/registry/
    - ${CARGO_HOME}/git/
    - target/
  policy: pull-push


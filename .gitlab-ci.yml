image: rust:1.95

variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
  CARGO_TERM_COLOR: always
  POSTGRES_USER: volt
  POSTGRES_PASSWORD: volt
  POSTGRES_DB: volt_test
  POSTGRES_HOST_AUTH_METHOD: trust

stages:
  - test
  - lint
  - security
  - docs
  - build
  - release

# Cache template reused across jobs (hidden job)
.cargo_cache: &cargo_cache
  key:
    files:
      - Cargo.lock
  paths:
    - ${CARGO_HOME}/registry/
    - ${CARGO_HOME}/git/
    - target/
  policy: pull-push

# â”€â”€ Test Stage â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
test:
  stage: test
  services:
    - name: pgvector/pgvector:pg16
      alias: postgres
  variables:
    DATABASE_URL: "postgres://volt:volt@postgres/volt_test"
  before_script:
    - apt-get update -qq && apt-get install -y -qq postgresql-client
    - rustc --version && cargo --version
    - until pg_isready -h postgres -p 5432 -U volt; do echo "Waiting for PostgreSQL..."; sleep 2; done
    - PGPASSWORD=volt psql -h postgres -U volt -d volt_test -f migrations/0001_core.sql
    - PGPASSWORD=volt psql -h postgres -U volt -d volt_test -f migrations/0002_jobs_and_routines.sql
    - PGPASSWORD=volt psql -h postgres -U volt -d volt_test -f migrations/0003_storage_optimizations.sql
    # Override Windows-specific MSVC flags set in .cargo/config.toml [env]
    - export CFLAGS="" && export CXXFLAGS=""
  script:
    # Full test suite (lib + all integration tests that don't require external API keys)
    - cargo test --lib --release --features testutils
    - cargo test --test cli_integration_tests --release --features testutils -- --skip heartbeat
    - cargo test --test professional_workflows --release --features testutils
    - cargo test --test real_world_benchmarks --release --features testutils
    # API-key-dependent tests — only run when keys are present
    - |
      if [ -n "$GROQ_API_KEY" ]; then
        cargo test --test program_bench --release --features testutils
      else
        echo "Skipping program_bench (requires GROQ_API_KEY)"
      fi
    # To run additional API-key-dependent tests (bfcl_pipeline, searchhq, heartbeat),
    # add GROQ_API_KEY, HF_TOKEN, and SEARCHHQ_API_TOKEN as GitLab CI/CD variables.
  cache:
    <<: *cargo_cache
  artifacts:
    when: always
    reports:
      junit: target/release/junit-*.xml
    paths:
      - target/release/deps/
    expire_in: 1 week

# â”€â”€ Lint Stage â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
fmt:
  stage: lint
  before_script:
    # Override Windows-specific MSVC flags set in .cargo/config.toml [env]
    - export CFLAGS="" && export CXXFLAGS=""
  script:
    - rustup component add rustfmt
    - cargo fmt -- --check
  cache:
    <<: *cargo_cache
    policy: pull

clippy:
  stage: lint
  before_script:
    # Override Windows-specific MSVC flags set in .cargo/config.toml [env]
    - export CFLAGS="" && export CXXFLAGS=""
  script:
    - rustup component add clippy
    - cargo clippy -- -D warnings
  cache:
    <<: *cargo_cache
    policy: pull

# â”€â”€ Security Stage â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
security_audit:
  stage: security
  image: rust:1.95
  before_script:
    # Override Windows-specific MSVC flags set in .cargo/config.toml [env]
    - export CFLAGS="" && export CXXFLAGS=""
    - cargo install cargo-audit
  script:
    - cargo audit
  allow_failure: true

secret_check:
  stage: security
  image: trufflesecurity/trufflehog:latest
  script:
    - trufflehog git file://. --only-verified
  allow_failure: true

# â”€â”€ Docs Stage â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
docs:
  stage: docs
  before_script:
    # Override Windows-specific MSVC flags set in .cargo/config.toml [env]
    - export CFLAGS="" && export CXXFLAGS=""
  script:
    - cargo doc --no-deps
  cache:
    <<: *cargo_cache
    policy: pull
  artifacts:
    paths:
      - target/doc/
    expire_in: 30 days

# â”€â”€ Build Stage â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
build_linux_gnu:
  stage: build
  image: rust:1.95
  before_script:
    - apt-get update -qq && apt-get install -y -qq libxdo-dev xdotool
    # Install Chrome for headless browser testing
    - wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
    - apt-get install -y -qq ./google-chrome-stable_current_amd64.deb || true
    - rm -f google-chrome-stable_current_amd64.deb
    - rustup target add x86_64-unknown-linux-gnu
    # Override Windows-specific MSVC flags set in .cargo/config.toml [env]
    - export CFLAGS="" && export CXXFLAGS=""
  script:
    - cargo build --release --target x86_64-unknown-linux-gnu --features tools-pdf,tools-desktop,tools-browser
    - strip target/x86_64-unknown-linux-gnu/release/volt
    - cd target/x86_64-unknown-linux-gnu/release && tar czf volt-linux-x86_64.tar.gz volt
  artifacts:
    paths:
      - target/x86_64-unknown-linux-gnu/release/volt-linux-x86_64.tar.gz
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG
  cache:
    <<: *cargo_cache
    policy: pull

build_linux_musl:
  stage: build
  image: rust:1.95
  before_script:
    - apt-get update -qq && apt-get install -y -qq musl-tools
    - rustup target add x86_64-unknown-linux-musl
    # Override Windows-specific MSVC flags set in .cargo/config.toml [env]
    - export CFLAGS="" && export CXXFLAGS=""
  script:
    - cargo build --release --target x86_64-unknown-linux-musl --features tools-pdf
    - strip target/x86_64-unknown-linux-musl/release/volt
    - cd target/x86_64-unknown-linux-musl/release && tar czf volt-linux-x86_64-musl.tar.gz volt
  artifacts:
    paths:
      - target/x86_64-unknown-linux-musl/release/volt-linux-x86_64-musl.tar.gz
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG
  allow_failure: true
  cache:
    <<: *cargo_cache
    policy: pull


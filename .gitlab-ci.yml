# Creates a GitLab release from tag artifacts.
# Also pushes to GitHub Releases if GITHUB_TOKEN CI/CD variable is set.
release:
  stage: release
  image: alpine:latest
  dependencies:
    - build_linux_gnu
    - build_linux_musl
    # Uncomment when self-hosted runners are available:
    # - build_macos_x86_64
    # - build_macos_aarch64
    # - build_windows
  before_script:
    - apk add --no-cache curl jq bash file
  script:
    - |
      # Create GitLab Release
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --data name="Volt ${CI_COMMIT_TAG}" \
           --data description="See [CHANGELOG](CHANGELOG.md) for details." \
           --data tag_name="${CI_COMMIT_TAG}" \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases"

      # Push to GitHub Releases if token provided
      if [ -n "${GITHUB_TOKEN}" ]; then
        echo "Creating GitHub release..."
        # Create release and extract upload URL
        release_response=$(curl -s -L \
          -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${GITHUB_TOKEN}" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "https://api.github.com/repos/${GITHUB_REPO:-iixiiartist/volt}/releases" \
          -d "{\"tag_name\":\"${CI_COMMIT_TAG}\",\"name\":\"Volt ${CI_COMMIT_TAG}\",\"body\":\"See CHANGELOG.md for details.\",\"draft\":false,\"prerelease\":false,\"generate_release_notes\":true}")
        upload_url=$(echo "$release_response" | jq -r '.upload_url // empty' | sed 's/{?name,label}//')
        
        if [ -z "$upload_url" ]; then
          echo "Failed to create GitHub release: $(echo "$release_response" | jq -r '.message // . // empty')"
          exit 1
        fi
        
        echo "Uploading artifacts to GitHub..."
        for artifact in target/*/release/*.tar.gz *.zip; do
          [ -f "$artifact" ] || continue
          asset_name=$(basename "$artifact")
          content_type=$(file -b --mime-type "$artifact")
          echo "Uploading ${asset_name} (${content_type})..."
          curl -s -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: ${content_type}" \
            "${upload_url}?name=${asset_name}" \
            --data-binary "@$artifact"
        done
      fi
  rules:
    - if: $CI_COMMIT_TAG

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: volt
          POSTGRES_PASSWORD: volt
          POSTGRES_DB: volt_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-action@stable
      
      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev
      
      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U volt; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
      
      - name: Initialize Database Schema
        run: |
          PGPASSWORD=volt psql -h localhost -U volt -d volt_test -f migrations/0001_core.sql
          PGPASSWORD=volt psql -h localhost -U volt -d volt_test -f migrations/0002_skills.sql
      
      - name: Build
        run: cargo build --release
      
      - name: Run Tests
        run: cargo test --release
      
      - name: Check Formatting
        run: cargo fmt -- --check
      
      - name: Check Clippy
        run: cargo clippy -- -D warnings
      
      - name: Test Skill Compilation
        run: |
          cd examples/github-pr-reviewer
          python test_skill.py
      
      - name: Build Binary Size Check
        run: |
          BINARY_SIZE=$(stat -c%s target/release/volt)
          echo "Binary size: $BINARY_SIZE bytes"
          if [ $BINARY_SIZE -gt 20000000 ]; then
            echo "WARNING: Binary exceeds 20MB"
          fi

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Security Audit
        uses: rustsec/audit-check@v1.4.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Check for Secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Documentation
        run: cargo doc --no-deps
      
      - name: Upload Documentation
        uses: actions/upload-artifact@v3
        with:
          name: documentation
          path: target/doc/

  deploy:
    needs: [test, security, docs]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Release Binary
        run: cargo build --release
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: target/release/volt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
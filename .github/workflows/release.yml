name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build — ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 (glibc — broadest compatibility) ────────────────
          # Excludes screenshot (windows-capture is Windows-only)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: volt
            asset_name: volt-linux-x86_64.tar.gz
            features: --features tools-pdf,tools-desktop,tools-browser
            strip: true
            needs_chrome: true

          # ── Linux x86_64 (musl — fully static, Alpine/Docker scratch) ──
          # Desktop + browser excluded: both need dynamic system libs (X11, Chrome)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: volt
            asset_name: volt-linux-x86_64-musl.tar.gz
            features: --features tools-pdf
            strip: true
            needs_chrome: false

          # ── macOS Intel ─────────────────────────────────────────────────
          - target: x86_64-apple-darwin
            os: macos-13
            artifact: volt
            asset_name: volt-macos-x86_64.tar.gz
            features: --features tools-pdf,tools-desktop,tools-browser
            strip: false
            needs_chrome: false

          # ── macOS Apple Silicon ─────────────────────────────────────────
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: volt
            asset_name: volt-macos-aarch64.tar.gz
            features: --features tools-pdf,tools-desktop,tools-browser
            strip: false
            needs_chrome: false

          # ── Windows x86_64 ──────────────────────────────────────────────
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: volt.exe
            asset_name: volt-windows-x86_64.zip
            features: --all-features
            strip: false
            needs_chrome: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      # ── Linux deps ─────────────────────────────────────────────────────
      - name: Install Linux deps (gnu)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y pkg-config libssl-dev libxdo-dev xdotool

      - name: Install Chrome for headless_chrome
        if: matrix.needs_chrome == true
        run: |
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt install -y ./google-chrome-stable_current_amd64.deb
          rm google-chrome-stable_current_amd64.deb

      - name: Install musl toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools
          # reqwest uses rustls, not OpenSSL — no native deps needed

      # ── macOS deps ──────────────────────────────────────────────────────
      - name: Install macOS deps
        if: startsWith(matrix.os, 'macos')
        run: |
          brew install pkg-config
          # reqwest uses rustls, not OpenSSL — no native deps needed

      # ── Build ──────────────────────────────────────────────────────────
      - name: Build
        run: |
          cargo build --release --target ${{ matrix.target }} ${{ matrix.features }}

      # ── Strip binary (Linux only — reduces size ~30%) ──────────────────
      - name: Strip binary
        if: matrix.strip == true
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact }}

      # ── Package ───────────────────────────────────────────────────────
      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ${{ matrix.asset_name }} ${{ matrix.artifact }}
          mv ${{ matrix.asset_name }} $GITHUB_WORKSPACE/

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $src = "target\${{ matrix.target }}\release\${{ matrix.artifact }}"
          Compress-Archive -Path $src -DestinationPath "${{ matrix.asset_name }}"

      # ── Upload artifact for release job ───────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          retention-days: 1

  # ── Publish GitHub Release ─────────────────────────────────────────────
  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volt — AI Agent</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #f4f6f8; --surface: #fff; --primary: #4f46e5; --primary-hover: #4338ca;
            --text: #1a1a2e; --text-muted: #6b7280; --border: #e5e7eb;
            --user-msg: #4f46e5; --user-text: #fff; --assistant-msg: #fff;
            --assistant-border: #e5e7eb; --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --radius: 8px;
        }
        html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text); }
        .chat-container { display: flex; flex-direction: column; height: 100vh; max-width: 800px; margin: 0 auto; position: relative; }
        .chat-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; }
        .header-main { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .header-main h1 { font-size: 18px; font-weight: 700; }
        .model-badge { font-size: 11px; background: #eef2ff; color: var(--primary); padding: 2px 8px; border-radius: 20px; font-weight: 600; }
        .mode-badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; text-transform: uppercase; }
        .mode-balanced { background: #dbeafe; color: #1d4ed8; }
        .mode-precision { background: #fef3c7; color: #b45309; }
        .mode-autonomous { background: #ede9fe; color: #7c3aed; }
        .messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 14px; white-space: pre-wrap; word-wrap: break-word; }
        .message.user { align-self: flex-end; background: var(--user-msg); color: var(--user-text); border-bottom-right-radius: 4px; }
        .message.assistant { align-self: flex-start; background: var(--assistant-msg); border: 1px solid var(--assistant-border); border-bottom-left-radius: 4px; }
        .message.research { align-self: flex-start; background: #f0fdf4; border: 1px solid #86efac; border-bottom-left-radius: 4px; }
        .message.system { align-self: center; background: #f3f4f6; font-size: 12px; color: var(--text-muted); padding: 6px 12px; border-radius: 20px; }
        .message .timestamp { font-size: 11px; color: var(--text-muted); margin-top: 6px; }
        .message.user .timestamp { text-align: right; color: rgba(255,255,255,0.7); }
        .message.research .timestamp { color: #15803d; }
        .empty-state { text-align: center; color: var(--text-muted); padding: 40px 20px; align-self: center; }
        .empty-icon { font-size: 40px; margin-bottom: 12px; }
        .empty-hint { font-size: 13px; margin-top: 8px; color: #9ca3af; }
        .hint-btn { display: inline-block; margin: 6px 4px; padding: 8px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; font-size: 13px; cursor: pointer; transition: all 0.2s; color: var(--text); }
        .hint-btn:hover { border-color: var(--primary); color: var(--primary); }
        .chat-form { display: flex; gap: 8px; padding: 12px 20px; background: var(--surface); border-top: 1px solid var(--border); }
        .chat-form input[type="text"] { flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; outline: none; transition: border-color 0.2s; }
        .chat-form input[type="text"]:focus { border-color: var(--primary); }
        .chat-form button { padding: 10px 20px; background: var(--primary); color: #fff; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .chat-form button:hover { background: var(--primary-hover); }
        .chat-form button:disabled { opacity: 0.5; cursor: not-allowed; }
        .session-bar { display: flex; align-items: center; justify-content: flex-end; padding: 6px 20px; background: var(--bg); border-top: 1px solid var(--border); font-size: 12px; color: var(--text-muted); gap: 12px; }
        .session-bar button { background: none; border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; font-size: 12px; cursor: pointer; color: var(--text-muted); }
        .session-bar button:hover { background: var(--surface); color: var(--text); }
    </style>
</head>
<body>
<div class="chat-container">
    <header class="chat-header">
        <div class="header-main">
            <h1>Volt</h1>
            <span class="model-badge">{{ model }}</span>
            <span class="mode-badge mode-{{ mode }}">{{ mode }}</span>
        </div>
    </header>
    <div class="messages" id="messages">
        <div class="empty-state">
            <div class="empty-icon">&#x26A1;</div>
            <div>Send a message to start.</div>
            <div class="empty-hint">I can browse the web, write code, search files, and more.</div>
            <button class="hint-btn" onclick="sendHint('Say hello world')">Say hello world</button>
            <button class="hint-btn" onclick="sendHint('Browse the web and summarize the latest AI news')">Browse web for AI news</button>
            <button class="hint-btn" onclick="sendHint('Write a Python script to calculate fibonacci')">Write a Python script</button>
        </div>
    </div>
    <form class="chat-form" id="chat-form">
        <input type="text" id="message-input" placeholder="Type your message..." autofocus>
        <button type="submit" id="send-btn">Send</button>
    </form>
    <div class="session-bar">
        <span>Session: <strong id="session-display">{{ session_id_short }}</strong></span>
        <button id="new-session-btn">+ New</button>
    </div>
</div>
<script>
    const messagesEl = document.getElementById('messages');
    const form = document.getElementById('chat-form');
    const input = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    let sessionId = '{{ session_id }}';

    // Explicit research commands. Only these exact prefixes bypass the agent.
    const RESEARCH_TRIGGERS = ['/search', '/research', '/web', '/websearch', '/google'];

    // Optional: also trigger on explicit natural phrases at start
    const RESEARCH_PHRASES = ['search for', 'web search for', 'search the web for'];

    function isResearchQuery(text) {
        const lower = text.toLowerCase().trim();
        return RESEARCH_TRIGGERS.some(t => lower.startsWith(t))
            || RESEARCH_PHRASES.some(t => lower.startsWith(t));
    }

    function addMessage(role, content) {
        const div = document.createElement('div');
        div.className = 'message ' + role;
        const contentSpan = document.createElement('span');
        contentSpan.className = 'msg-content';
        contentSpan.textContent = content;
        div.appendChild(contentSpan);
        const tsDiv = document.createElement('div');
        tsDiv.className = 'timestamp';
        tsDiv.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        div.appendChild(tsDiv);
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return div;
    }

    function addSystem(msg) {
        const div = document.createElement('div');
        div.className = 'message system';
        div.textContent = msg;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function setEnabled(en) {
        sendBtn.disabled = !en;
        input.disabled = !en;
        if (en) input.focus();
    }

    async function callResearch(message) {
        addSystem('&#x1F50D; Researching: ' + message);
        try {
            const resp = await fetch('/research', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: message, count: 5 })
            });
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            const data = await resp.json();
            if (data.error) {
                addSystem('Research error: ' + data.error);
                return false;
            }
            if (data.result) {
                // Parse JSON results and show top hits
                try {
                    const parsed = JSON.parse(data.result);
                    const hits = parsed.results?.web || parsed.results?.news || [];
                    if (hits.length > 0) {
                        let summary = '';
                        hits.slice(0, 3).forEach((h, i) => {
                            summary += (i+1) + '. ' + (h.title || 'Result') + '\n' + (h.url || '') + '\n' + (h.description || '') + '\n\n';
                        });
                        summary += '(Research via you.com)';
                        addMessage('research', summary);
                    } else {
                        addMessage('research', data.result.substring(0, 500) + '\n\n(Research via you.com)');
                    }
                } catch (e) {
                    addMessage('research', data.result.substring(0, 500) + '\n\n(Research via you.com)');
                }
                return true;
            }
        } catch (err) {
            addSystem('Research failed: ' + err.message);
        }
        return false;
    }

    async function callChat(message) {
        try {
            const resp = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message, session_id: sessionId })
            });
            if (!resp.ok) {
                const errText = await resp.text();
                addSystem('Error: ' + errText);
                return;
            }
            const data = await resp.json();
            if (data.error) {
                addSystem('Error: ' + data.error);
            } else if (data.reply) {
                if (data.reply.startsWith('[fallback]')) {
                    addSystem('Agent fallback: no useful response from LLM');
                } else {
                    addMessage('assistant', data.reply);
                }
            } else {
                addSystem('No response');
            }
        } catch (err) {
            addSystem('Connection error: ' + err.message);
        }
    }

    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        const message = input.value.trim();
        if (!message) return;

        input.value = '';
        setEnabled(false);
        document.querySelector('.empty-state')?.remove();
        addMessage('user', message);

        const useResearch = isResearchQuery(message);
        if (useResearch) {
            const ok = await callResearch(message);
            if (!ok) {
                await callChat(message);
            }
        } else {
            await callChat(message);
        }

        setEnabled(true);
    });

    document.getElementById('new-session-btn').addEventListener('click', async function() {
        const resp = await fetch('/session/new', { method: 'POST' });
        const data = await resp.json();
        sessionId = data.session_id;
        document.getElementById('session-display').textContent = sessionId.slice(0, 8);
        messagesEl.innerHTML = '<div class="empty-state"><div class="empty-icon">&#x26A1;</div><div>New session started.</div></div>';
    });

    function sendHint(text) {
        input.value = text;
        form.dispatchEvent(new Event('submit'));
    }
</script>
</body>
</html>
